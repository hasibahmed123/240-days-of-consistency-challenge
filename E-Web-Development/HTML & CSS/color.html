<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>basics of CSS</title>

<style>

li {
    color: rgb(255, 0, 0);
    font-size: 20px;
}
/* we applied style on inline li tag, it is called element selector */

p {
    color: rgb(25, 0, 255);
    font-size: 20px;
    background: #0dee72de;
    width: 50%;
}
/* we applied style on internal p tag it is called element selector */

#unique {
color: brown;
text-align: center;
background-color: chartreuse;

}
/* we applied style on internal p tag with id, id selector is used for one element only */

#mew {
    color: blue; 
    font-size: 30px;
    background-color: yellow;
    font-style: italic;
}

.player {
    color: red;
    font-size: 20px;
    background-color: aquamarine;
    text-align: center  ;
}

/* we applied style on internal p tag with class, class selector is used for multiple elements */
</style>

</head>
<body>
   <h3 style="color: blueviolet;"> Learning The Basics of Css</h3> 

<p>very nice huh</p>
<p>very nice huh</p>
<p>very nice huh</p>
<p id="unique">very nice huh</p>
<p>very nice huh</p>
<p class="player">very nice huh</p>
<p class="player">very nice huh</p>

<ul>
<li style="background-color: aquamarine;">inline</li>
<li id="mew">internal</li>
<li>external</li>

</ul>
</body>
</html>

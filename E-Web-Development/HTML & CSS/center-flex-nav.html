<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Center Box</title>
  <style>
    /* Reset and base styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: Arial, sans-serif;
    }

    /* Flex container to center content */
    .container {
      display: flex;
      justify-content: center; /* horizontal center */
      align-items: center;     /* vertical center */
      height: 100%;
      background-color: #f5f5dc; /* bisque */
      padding: 20px;
    }

    /* Centered box */
    .box {
      background-color: #6a5acd; /* slate blue */
      color: white;
      font-size: 2rem;
      width: 300px;
      height: 300px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 10px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      margin: 0 auto; /* horizontal center fallback */
      text-align: center;
    }
  </style>
  <link rel="stylesheet" href="./styles/nav.css">
</head>
<body>

<header>
<nav>

</ul>
</nav>
</header>

  <div class="container">
    <div class="box">
      Centered Box
    </div>
  </div>
</body>
</html>
